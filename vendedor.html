<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Loja - UaiPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #f4f5f7; display: flex; height: 100vh; color: #333; overflow: hidden; }
        
        .mobile-header { display: none; }

        /* SIDEBAR / MENU */
        .sidebar { width: 260px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.02); z-index: 100; flex-shrink: 0; height: 100vh; }
        .store-header { padding: 25px 20px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        .store-logo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #ea1d2c; margin-bottom: 10px; }
        .store-name { font-size: 1.2rem; font-weight: 900; color: #111; letter-spacing: -0.5px;}
        .store-status-toggle { margin-top: 10px; padding: 10px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; cursor: pointer; border: none; width: 100%; transition: 0.2s; line-height: 1.3; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        
        .status-open { background: #e6f4ea; color: #00a14b; }
        .status-closed { background: #fef0f0; color: #ea1d2c; }
        
        .nav-menu { list-style: none; flex: 1; margin-top: 15px; overflow-y: auto; }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #555; transition: 0.2s; font-weight: 600; display: flex; align-items: center; gap: 12px; border-left: 4px solid transparent; }
        .nav-item svg { stroke: #555; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: #fff5f5; color: #ea1d2c; border-left: 4px solid #ea1d2c; }
        .nav-item:hover svg, .nav-item.active svg { stroke: #ea1d2c; }
        
        .btn-logout { margin: 20px; padding: 12px; background: #f8f8f8; color: #ea1d2c; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid #eee;}
        .btn-logout:hover { background: #fff0f0; border-color: #fbd5d5; }

        .main-content { flex: 1; height: 100vh; overflow-y: auto; padding: 25px; position: relative; background: #f4f5f7; }
        .section { display: none; height: 100%; flex-direction: column; }
        .section.active { display: flex !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { font-size: 1.5rem; color: #111; margin-bottom: 25px; flex-shrink: 0; font-weight: 900;}

        /* KANBAN DESKTOP */
        .kanban-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; flex: 1; min-height: 0; }
        .kanban-col { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #eee; display: flex; flex-direction: column; height: 100%;}
        .col-header { font-size: 0.95rem; font-weight: 800; color: #333; padding-bottom: 12px; border-bottom: 2px solid #eee; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;}
        .col-count { background: #ea1d2c; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; color: #fff; font-weight: bold;}
        .kanban-list-scroll { flex: 1; overflow-y: auto; padding-right: 5px; }

        .order-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 15px; margin-bottom: 15px; animation: slideIn 0.3s ease;}
        
        .payment-box { padding: 8px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;}
        .pay-cash { background: #e6f4ea; color: #0f5132; border: 1px solid #badbcc; }
        .pay-card { background: #eef4ff; color: #084298; border: 1px solid #b6d4fe; }
        .pay-pix { background: #fdf5e6; color: #997404; border: 1px solid #f9e1b5; }
        
        .btn-action { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #fff; margin-bottom: 5px; transition: 0.2s; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 6px;}
        .btn-action:active { transform: scale(0.98); }
        .btn-accept { background: #00a14b; } 
        .btn-dispatch { background: #0d6efd; }
        
        /* 🟢 ESTILO DO BOTÃO CINZA 🟢 */
        .btn-call-driver { background: #ea1d2c; color: #fff; }
        .btn-call-driver:disabled { background: #ccc !important; color: #fff !important; cursor: not-allowed; opacity: 1; border: 1px solid #bbb; }
        
        .driver-status-badge { background: #eef4ff; color: #0d6efd; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; border: 1px solid #b6d4fe; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 15px;}
        .driver-status-badge.offline { background: #fef0f0; color: #ea1d2c; border-color: #fbd5d5; }

        /* RESPONSIVIDADE MOBILE */
        @media screen and (max-width: 850px) {
            body { display: block; overflow-y: auto; }
            .sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: auto; flex-direction: row; border-right: none; border-top: 1px solid #eee; z-index: 9999; }
            .main-content { padding: 15px; height: calc(100vh - 70px); }
            .kanban-board { display: flex; flex-direction: row; overflow-x: auto; scroll-snap-type: x mandatory; }
            .kanban-col { flex: 0 0 85vw; scroll-snap-align: center; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="store-header">
            <img src="" id="ui-store-logo" class="store-logo" alt="Logo">
            <div class="store-name" id="ui-store-name">Carregando...</div>
            <button id="btn-toggle-status" class="store-status-toggle" onclick="window.toggleStoreStatus()">Status</button>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="window.switchTab('pedidos', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <span>Pedidos</span>
            </li>
        </ul>
        <div class="btn-logout" onclick="window.logoutStore()">Sair do Sistema</div>
    </aside>

    <main class="main-content">
        <section id="pedidos" class="section active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
                <h2 style="margin:0;">Painel de Pedidos</h2>
                <div id="driver-status-indicator" class="driver-status-badge offline">Buscando entregadores...</div>
            </div>
            
            <div class="kanban-board">
                <div class="kanban-col">
                    <div class="col-header">Novos <span class="col-count" id="count-pendente">0</span></div>
                    <div class="kanban-list-scroll" id="list-pendente"></div>
                </div>
                <div class="kanban-col">
                    <div class="col-header">Preparando <span class="col-count" id="count-preparo" style="background:#f39c12;">0</span></div>
                    <div class="kanban-list-scroll" id="list-preparo"></div>
                </div>
                <div class="kanban-col">
                    <div class="col-header">Em Rota <span class="col-count" id="count-rota" style="background:#0d6efd;">0</span></div>
                    <div class="kanban-list-scroll" id="list-rota"></div>
                </div>
                <div class="kanban-col">
                    <div class="col-header">Finalizados <span class="col-count" id="count-concluido" style="background:#00a14b;">0</span></div>
                    <div class="kanban-list-scroll" id="list-concluido"></div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBinV28T4xWvYAnE0Yed1rbsp9dEF_n7Eg",
            authDomain: "dores-delivery.firebaseapp.com",
            projectId: "dores-delivery",
            storageBucket: "dores-delivery.firebasestorage.app",
            messagingSenderId: "1029498697239",
            appId: "1:1029498697239:web:3ebc070bbd65048bd9ce52"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loggedStore = JSON.parse(localStorage.getItem('loggedStore'));
        let globalOrders = [];
        let onlineDriversCount = 0;

        window.onload = () => {
            if(!loggedStore || !loggedStore.id) return window.location.href = 'login-vendedor.html';
            document.getElementById('ui-store-name').innerText = loggedStore.name;
            document.getElementById('ui-store-logo').src = loggedStore.logo || 'https://via.placeholder.com/80';
            
            startListeners();
        };

        function startListeners() {
            // 🟢 ESCUTA ENTREGADORES ONLINE (BLINDAGEM NÍVEL 2) 🟢
            onSnapshot(collection(db, "drivers"), (snapshot) => {
                onlineDriversCount = 0;
                
                // Função para limpar acentos, espaços e jogar pra minúsculo
                const normalizeCity = (cidadeText) => {
                    if (!cidadeText) return "";
                    return cidadeText.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().split('-')[0].trim();
                };

                const myCity = normalizeCity(loggedStore.city);

                snapshot.forEach(docSnap => {
                    const drv = docSnap.data();
                    const drCity = normalizeCity(drv.city);
                    
                    // Tratamento robusto para isOnline (pode ser true booleano ou "true" texto)
                    const isOnline = (drv.isOnline === true || String(drv.isOnline) === "true");
                    // Tratamento robusto para isActive (garantir que não está bloqueado pelo admin)
                    const isActive = (drv.isActive !== false);

                    // Se estiver online, ativo, e a cidade bater (ou se não tiver cidade configurada)
                    if (isOnline && isActive) {
                        if (!myCity || !drCity || drCity.includes(myCity) || myCity.includes(drCity)) {
                            onlineDriversCount++;
                        }
                    }
                });

                const indicator = document.getElementById('driver-status-indicator');
                if (onlineDriversCount > 0) {
                    indicator.className = 'driver-status-badge';
                    indicator.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> ${onlineDriversCount} Entregador(es) Online`;
                } else {
                    indicator.className = 'driver-status-badge offline';
                    indicator.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg> Nenhum entregador online`;
                }
                window.renderOrders(); // Re-renderiza para atualizar o botão
            });

            // 2. ESCUTA PEDIDOS
            const qOrders = query(collection(db, "orders"), where("storeId", "==", loggedStore.id));
            onSnapshot(qOrders, (snapshot) => {
                globalOrders = [];
                snapshot.forEach(d => globalOrders.push({ id: d.id, ...d.data() }));
                window.renderOrders();
            });
        }

        window.renderOrders = () => {
            const listIds = ['list-pendente', 'list-preparo', 'list-rota', 'list-concluido'];
            listIds.forEach(id => document.getElementById(id).innerHTML = '');
            
            let counts = { pend:0, prep:0, rota:0, conc:0 };

            globalOrders.forEach(order => {
                const shortId = order.id.substring(0, 6).toUpperCase();
                const isPickup = order.orderType === 'retirada' || (order.customer && order.customer.address && order.customer.address.includes('RETIRADA'));
                
                let actionBtn = '';
                
                // Mapeia botões dependendo do status
                if (order.status === 'Pendente') {
                    actionBtn = `<button class="btn-action btn-accept" onclick="window.upStatus('${order.id}','Aceito')">Aceitar Pedido</button>`;
                    counts.pend++;
                    document.getElementById('list-pendente').innerHTML += createCard(order, actionBtn, shortId);
                } 
                else if (order.status === 'Aceito' || order.status === 'Em Preparo') {
                    if (order.status === 'Aceito') {
                        actionBtn = `<button class="btn-action" style="background:#f39c12" onclick="window.upStatus('${order.id}','Em Preparo')">Iniciar Preparo</button>`;
                    } else {
                        if (isPickup) {
                            actionBtn = `<button class="btn-action btn-dispatch" onclick="window.upStatus('${order.id}','Concluído')">Entregar ao Cliente</button>`;
                        } else {
                            // 🟢 AQUI DEFINE SE O BOTÃO FICA ACESO OU CINZA 🟢
                            if (onlineDriversCount > 0) {
                                actionBtn = `<button class="btn-action btn-call-driver" onclick="window.upStatus('${order.id}','Aguardando Entregador')">Solicitar Entregador</button>`;
                            } else {
                                actionBtn = `<button class="btn-action btn-call-driver" disabled>Nenhum entregador disponível no momento.</button>`;
                            }
                        }
                    }
                    counts.prep++;
                    document.getElementById('list-preparo').innerHTML += createCard(order, actionBtn, shortId);
                }
                else if (['Aguardando Entregador', 'Saiu para Entrega'].includes(order.status)) {
                    const msg = order.status === 'Saiu para Entrega' ? `Com: ${order.driverName || 'Entregador'}` : 'Aguardando entregador aceitar...';
                    actionBtn = `<div style="text-align:center; font-size:0.85rem; font-weight:bold; color:#ea1d2c; margin-top:5px;">${msg}</div>`;
                    counts.rota++;
                    document.getElementById('list-rota').innerHTML += createCard(order, actionBtn, shortId);
                }
                else {
                    counts.conc++;
                    // Apenas renderiza os concluídos de HOJE para não pesar a tela
                    const startOfToday = new Date().setHours(0,0,0,0);
                    if(order.timestamp >= startOfToday) {
                        document.getElementById('list-concluido').innerHTML += createCard(order, '<div style="color:#00a14b; text-align:center; font-weight:bold;">Pedido Concluído</div>', shortId);
                    }
                }
            });

            document.getElementById('count-pendente').innerText = counts.pend;
            document.getElementById('count-preparo').innerText = counts.prep;
            document.getElementById('count-rota').innerText = counts.rota;
            document.getElementById('count-concluido').innerText = counts.conc;
        };

        function createCard(order, action, shortId) {
            let details = '';
            if(order.items && Array.isArray(order.items)) {
                details = order.items.map(i => `${i.qty}x ${i.name}`).join('<br>');
            }

            return `
                <div class="order-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px; border-bottom:1px dashed #eee; padding-bottom:8px;">
                        <span style="font-weight:900; color:#ea1d2c;">#${shortId}</span>
                        <span style="font-size:0.85rem; color:#111; font-weight:bold;">R$ ${(order.total || 0).toFixed(2)}</span>
                    </div>
                    <div style="font-size:0.9rem; margin-bottom:10px; color: #333;">
                        <strong style="font-size: 1rem;">${order.customerName || 'Cliente'}</strong><br>
                        <div style="font-size:0.75rem; color:#777; margin-top:4px; line-height:1.4;">${details}</div>
                        <div style="margin-top:6px; font-size: 0.8rem; background: #f9f9f9; padding: 4px; border-radius: 4px;">💳 ${order.paymentMethod || 'Dinheiro'}</div>
                    </div>
                    ${action}
                </div>`;
        }

        window.upStatus = async (id, status) => {
            try { await updateDoc(doc(db, "orders", id), { status: status }); } catch(e) { alert("Erro ao atualizar o pedido."); }
        };

        window.logoutStore = () => { localStorage.removeItem('loggedStore'); window.location.href = 'login-vendedor.html'; };
        window.switchTab = (tab, el) => { };
    </script>
</body>
</html>
