<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App do Entregador - UaiPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f4f5f7; color: #333; overflow-x: hidden; }
        
        /* TELA DE LOGIN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: #fff; width: 100%; max-width: 380px; padding: 40px 30px; border-radius: 24px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .login-box h2 { color: #ea1d2c; font-weight: 900; margin-bottom: 5px; font-size: 1.8rem; letter-spacing: -0.5px;}
        .login-box p { color: #777; font-size: 0.95rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.8rem; color: #555; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        .form-input { width: 100%; padding: 16px; border: 1px solid #e5e5e5; border-radius: 12px; font-size: 1rem; outline: none; background: #fdfdfd; transition: 0.3s; color: #333;}
        .form-input:focus { border-color: #ea1d2c; box-shadow: 0 0 0 4px rgba(234, 29, 44, 0.1); background: #fff;}
        .btn-login { width: 100%; background: linear-gradient(135deg, #ea1d2c, #ff4b58); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-size: 1.15rem; cursor: pointer; margin-top: 10px; box-shadow: 0 6px 15px rgba(234, 29, 44, 0.25); transition: 0.3s; }
        .btn-login:active { transform: translateY(2px); box-shadow: 0 2px 8px rgba(234, 29, 44, 0.2); }

        /* HEADER & NAVBAR */
        #app-screen { display: none; padding-bottom: 80px; }
        header { background: #111; color: #fff; padding: 30px 20px 40px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); position: sticky; top: 0; z-index: 100;}
        .app-logo { text-align: center; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .app-logo-text { font-size: 2.2rem; font-weight: 900; font-style: italic; letter-spacing: -1px; }
        .app-logo-text .uai { color: #ea1d2c; }
        .app-logo-text .pede { color: #fff; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .driver-info h1 { font-size: 1.4rem; font-weight: 900; color: #fff; margin: 0; letter-spacing: -0.5px;}
        
        .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; margin-top: 8px; transition: 0.2s; }
        .btn-logout:active { background: rgba(255,255,255,0.2); }

        /* STATUS TOGGLE (IOS STYLE) */
        .status-toggle { display: flex; flex-direction: column; align-items: flex-end; gap: 5px;}
        .status-badge { background: rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; }
        .status-badge span { font-size: 0.75rem; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
        .toggle-switch { position: relative; width: 42px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}
        input:checked + .slider { background-color: #00a14b; }
        input:checked + .slider:before { transform: translateX(18px); }

        /* TABS (FLUTUANTES) */
        .tabs { display: flex; gap: 10px; padding: 0 20px; margin-top: -20px; position: relative; z-index: 101; }
        .tab-btn { flex: 1; padding: 14px 5px; text-align: center; font-weight: 800; font-size: 0.85rem; border-radius: 16px; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-transform: uppercase; letter-spacing: 0.5px;}
        .tab-btn.active { background: linear-gradient(135deg, #ea1d2c, #ff4b58); color: #fff; box-shadow: 0 6px 15px rgba(234, 29, 44, 0.3); transform: translateY(-2px);}
        .tab-btn.inactive { background: #fff; color: #777; border: 1px solid #eee; }

        .content-area { padding: 25px 20px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS DE PEDIDO MELHORADOS (UI) */
        .ride-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; transition: transform 0.2s;}
        .ride-card:active { transform: scale(0.98); }
        .ride-card.new { border: 2px solid #ea1d2c; animation: pulseBorder 2s infinite; position: relative; overflow: hidden;}
        .ride-card.new::before { content: ''; position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: #ea1d2c; }
        
        @keyframes pulseBorder { 0% { box-shadow: 0 0 0 0 rgba(234,29,44,0.4); } 70% { box-shadow: 0 0 0 10px rgba(234,29,44,0); } 100% { box-shadow: 0 0 0 0 rgba(234,29,44,0); } }
        
        .r-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f4f5f7; padding-bottom: 15px; margin-bottom: 15px; }
        .r-fee { display: flex; flex-direction: column; align-items: flex-end; }
        .r-fee span { font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: bold; }
        .r-fee strong { font-size: 1.6rem; font-weight: 900; color: #00a14b; letter-spacing: -0.5px; }
        .badge-new { background: #ea1d2c; color: #fff; padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; letter-spacing: 1px; }

        /* TIMELINE (ROTA DA ENTREGA) */
        .route-info { position: relative; padding-left: 20px; margin-bottom: 20px; }
        .route-info::before { content: ''; position: absolute; top: 8px; bottom: 15px; left: 5px; width: 2px; background: #eee; }
        .route-step { position: relative; margin-bottom: 15px; }
        .route-step:last-child { margin-bottom: 0; }
        .step-dot { position: absolute; left: -20px; top: 4px; width: 12px; height: 12px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 0 1px #ddd; background: #fff;}
        .dot-store { background: #ea1d2c; box-shadow: 0 0 0 2px #ea1d2c; }
        .dot-house { background: #00a14b; box-shadow: 0 0 0 2px #00a14b; }
        .route-step small { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 2px;}
        .route-step b { display: block; font-size: 1rem; color: #111; font-weight: 800; line-height: 1.2; }
        .route-step p { font-size: 0.85rem; color: #555; margin-top: 4px; line-height: 1.3; }

        /* BOTÕES DOS CARDS */
        .btn-waze { background: #f0f6ff; color: #0d6efd; padding: 14px; border-radius: 14px; border: 1px solid #dce8ff; font-weight: 800; font-size: 0.95rem; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; cursor: pointer;}
        .btn-waze:active { background: #dbe7ff; transform: scale(0.98);}
        
        .btn-action { width: 100%; border: none; padding: 16px; border-radius: 16px; font-weight: 900; font-size: 1.1rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px;}
        .btn-action:active { transform: scale(0.98); }
        .btn-accept { background: linear-gradient(135deg, #ea1d2c, #ff4b58); color: #fff; box-shadow: 0 4px 15px rgba(234, 29, 44, 0.25); }
        .btn-finish { background: linear-gradient(135deg, #00a14b, #28d078); color: #fff; box-shadow: 0 4px 15px rgba(0, 161, 75, 0.25); }

        .empty-msg { text-align: center; padding: 60px 20px; }
        .empty-msg h3 { color: #111; font-weight: 900; font-size: 1.2rem; margin-bottom: 8px;}
        .empty-msg p { color: #777; font-size: 0.9rem; }

        /* NOTIFICAÇÃO TOAST */
        .toast-msg { position: fixed; top: -100px; left: 5%; right: 5%; background: #fff; border-left: 8px solid #ea1d2c; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); padding: 20px; display: flex; align-items: center; justify-content: center; gap: 15px; z-index: 100000; transition: top 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); border-right: 1px solid #f0f0f0; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0;}
        .toast-msg h4 { font-size: 1.2rem; font-weight: 900; color: #ea1d2c; margin: 0; }
        .toast-msg.show { top: 20px; }

        /* FILTRO DE HISTÓRICO */
        .filter-box { background: #fff; padding: 15px 20px; border-radius: 16px; border: 1px solid #eee; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.02);}
        .filter-box label { font-weight: 800; color: #555; font-size: 0.85rem; text-transform: uppercase;}
        .filter-box input { padding: 10px 14px; border-radius: 12px; border: 1px solid #e5e5e5; outline: none; font-weight: bold; color: #111; font-family: 'Roboto', sans-serif; font-size: 0.95rem; background: #f9f9f9;}
        .filter-box input:focus { border-color: #ea1d2c; }

        /* REFINAMENTO DO CARD GERADO NO HISTÓRICO JS */
        #history-rides-list > div:first-child { box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; font-size: 1.1rem; }
        .history-card { background: #fff; padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #00a14b;}
        .h-store { font-size: 0.95rem; color: #333; font-weight: bold; }
        .h-val { font-size: 1.1rem; color: #00a14b; font-weight: 900; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>UaiPede Entregas</h2>
            <div class="form-group"><label>E-mail</label><input type="email" id="login-email" class="form-input" placeholder="Seu e-mail"></div>
            <div class="form-group"><label>Senha</label><input type="password" id="login-pass" class="form-input" placeholder="Sua senha"></div>
            <button class="btn-login" onclick="window.loginDriver()">Entrar no Sistema</button>
        </div>
    </div>

    <div id="app-screen">
        <header>
            <div class="app-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ea1d2c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 15 Q 50 55 95 15"></path></svg>
                <div class="app-logo-text" style="font-size: 1.8rem;"><span class="uai">Uai</span><span class="pede">Pede</span></div>
            </div>
            <div class="header-top">
                <div class="driver-info">
                    <h1 id="driver-name-display">Olá</h1>
                    <button class="btn-logout" onclick="window.logoutDriver()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        Sair da conta
                    </button>
                </div>
                <div class="status-toggle">
                    <div class="status-badge">
                        <label class="toggle-switch">
                            <input type="checkbox" id="driver-status-toggle" onchange="window.toggleOnlineStatus()">
                            <span class="slider"></span>
                        </label>
                        <span id="status-text">OFFLINE</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="tab-novas" onclick="window.switchTab('novas')">Novas <span id="badge-novas" style="background:#fff; color:#ea1d2c; padding:2px 6px; border-radius:10px; font-size:0.7rem; display:none;">0</span></button>
            <button class="tab-btn inactive" id="tab-minhas" onclick="window.switchTab('minhas')">Atuais</button>
            <button class="tab-btn inactive" id="tab-historico" onclick="window.switchTab('historico')">Histórico</button>
        </div>

        <div class="content-area">
            <div id="sec-novas" class="section active">
                <div id="offline-msg" class="empty-msg">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:15px;"><path d="M10.1 2.182a10 10 0 0 1 3.8 0"></path><path d="M13.9 21.818a10 10 0 0 1-3.8 0"></path><path d="M17.609 3.721a10 10 0 0 1 2.69 2.7"></path><path d="M2.69 17.609a10 10 0 0 1 2.7 2.69"></path><path d="M20.279 17.609a10 10 0 0 1-2.7 2.69"></path><path d="M6.391 3.721a10 10 0 0 1-2.7 2.7"></path><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="12" x2="22" y2="2"></line><line x1="2" y1="2" x2="22" y2="22"></line></svg>
                    <h3>Você está Offline</h3>
                    <p>Fique online para receber novos pedidos na sua região.</p>
                </div>
                <div id="no-rides-msg" class="empty-msg" style="display: none;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ea1d2c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:15px; opacity:0.5;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    <h3>Buscando corridas...</h3>
                    <p>Aguarde, os novos pedidos aparecerão aqui.</p>
                </div>
                <div id="available-rides-list"></div>
            </div>
            
            <div id="sec-minhas" class="section">
                <div id="no-active-msg" class="empty-msg">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:15px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <h3>Nenhuma entrega em andamento</h3>
                </div>
                <div id="my-rides-list"></div>
            </div>
            
            <div id="sec-historico" class="section">
                <div class="filter-box">
                    <label>Data:</label>
                    <input type="date" id="history-date-filter" onchange="window.renderHistoryOrders()">
                </div>
                <div id="history-rides-list"></div>
            </div>
        </div>
    </div>

    <div id="new-ride-toast" class="toast-msg">
        <h4 style="color:#ea1d2c; font-weight:900;">NOVA CORRIDA!</h4>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBinV28T4xWvYAnE0Yed1rbsp9dEF_n7Eg",
            authDomain: "dores-delivery.firebaseapp.com",
            projectId: "dores-delivery",
            storageBucket: "dores-delivery.firebasestorage.app",
            messagingSenderId: "1029498697239",
            appId: "1:1029498697239:web:3ebc070bbd65048bd9ce52"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let loggedDriver = JSON.parse(localStorage.getItem('loggedDriver'));
        let isOnline = false;
        let storesCache = {}; 
        let availableCount = 0;
        let allPendingOrders = [];
        let myAcceptedOrders = [];
        let myHistoryOrders = [];

        window.onload = async () => {
            if (loggedDriver && loggedDriver.id) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('driver-name-display').innerText = `Olá, ${loggedDriver.name.split(' ')[0]}`;
                if ("Notification" in window) Notification.requestPermission();
                document.getElementById('history-date-filter').value = new Date().toISOString().split('T')[0];
                
                await loadStoresCache();
                startListeners();

                // ESCUTAR O PRÓPRIO STATUS EM TEMPO REAL
                onSnapshot(doc(db, "drivers", loggedDriver.id), (docSnap) => {
                    if(docSnap.exists()){
                        const data = docSnap.data();
                        isOnline = (data.isOnline === true || data.isOnline === "true");
                        
                        document.getElementById('driver-status-toggle').checked = isOnline;
                        document.getElementById('status-text').innerText = isOnline ? "ONLINE" : "OFFLINE";
                        document.getElementById('status-text').style.color = isOnline ? "#00a14b" : "#fff";
                        document.getElementById('offline-msg').style.display = isOnline ? 'none' : 'block';
                        
                        renderAvailableOrders();
                    }
                });
            }
        };

        window.loginDriver = async () => {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const btn = document.querySelector('.btn-login');
            try {
                btn.innerText = "Entrando...";
                const q = query(collection(db, "drivers"), where("email", "==", email), where("password", "==", pass));
                const snap = await getDocs(q);
                if (snap.empty) {
                    btn.innerText = "Entrar no Sistema";
                    return alert("E-mail ou senha incorretos.");
                }
                loggedDriver = { id: snap.docs[0].id, ...snap.docs[0].data() };
                localStorage.setItem('loggedDriver', JSON.stringify(loggedDriver));
                window.location.reload();
            } catch(e) {
                btn.innerText = "Entrar no Sistema";
                alert("Erro ao logar. Verifique sua internet.");
            }
        };

        // NOVA FUNÇÃO: SAIR DO APP
        window.logoutDriver = async () => {
            if(confirm("Deseja realmente sair da sua conta? Você deixará de receber pedidos.")) {
                if(loggedDriver && loggedDriver.id) {
                    try {
                        // Força o entregador a ficar OFFLINE no banco antes de limpar o cache
                        await updateDoc(doc(db, "drivers", loggedDriver.id), { isOnline: false });
                    } catch(e) {
                        console.error("Erro ao deslogar:", e);
                    }
                }
                localStorage.removeItem('loggedDriver');
                window.location.reload(); 
            }
        };

        window.toggleOnlineStatus = async () => {
            isOnline = document.getElementById('driver-status-toggle').checked;
            document.getElementById('status-text').innerText = isOnline ? "ONLINE" : "OFFLINE";
            document.getElementById('status-text').style.color = isOnline ? "#00a14b" : "#fff";
            document.getElementById('offline-msg').style.display = isOnline ? 'none' : 'block';
            renderAvailableOrders(); 
            if(loggedDriver) await updateDoc(doc(db, "drivers", loggedDriver.id), { isOnline: isOnline });
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.classList.add('inactive'); });
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`sec-${tab}`).classList.add('active');
            if(tab === 'historico') window.renderHistoryOrders();
        };

        async function loadStoresCache() {
            const snap = await getDocs(collection(db, "stores"));
            snap.forEach(doc => { storesCache[doc.id] = doc.data(); });
        }

        function startListeners() {
            onSnapshot(collection(db, "orders"), (snapshot) => {
                let tempPending = [];
                let drCity = (loggedDriver.city || "").toLowerCase().split('-')[0].trim();

                snapshot.forEach(docSnap => {
                    const order = { id: docSnap.id, ...docSnap.data() };
                    if (order.status === "Aguardando Entregador") {
                        const store = storesCache[order.storeId] || {};
                        const stCity = (store.city || "").toLowerCase().split('-')[0].trim();
                        if (!drCity || stCity === drCity) tempPending.push(order);
                    }
                });

                if(isOnline && tempPending.length > availableCount) {
                    window.playAlertSound();
                    window.showSystemNotification();
                }
                allPendingOrders = tempPending;
                availableCount = allPendingOrders.length;
                renderAvailableOrders();
            });

            onSnapshot(query(collection(db, "orders"), where("driverId", "==", loggedDriver.id)), (snapshot) => {
                myAcceptedOrders = []; myHistoryOrders = [];
                snapshot.forEach(docSnap => {
                    const order = { id: docSnap.id, ...docSnap.data() };
                    if (order.status === 'Saiu para Entrega') myAcceptedOrders.push(order);
                    if (['Concluído', 'Concluido', 'Entregue'].includes(order.status)) myHistoryOrders.push(order);
                });
                renderMyOrders();
            });
        }

        window.showSystemNotification = () => {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("UaiPede Entregas", { body: "🚀 Nova entrega disponível para você!" });
            }
        };

        function renderAvailableOrders() {
            const container = document.getElementById('available-rides-list');
            const badge = document.getElementById('badge-novas');
            
            if (!isOnline) { container.innerHTML = ''; badge.style.display = 'none'; return; }
            
            document.getElementById('no-rides-msg').style.display = allPendingOrders.length === 0 ? 'block' : 'none';
            
            if (allPendingOrders.length > 0) {
                badge.innerText = allPendingOrders.length;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }

            container.innerHTML = allPendingOrders.map(order => `
                <div class="ride-card new">
                    <div class="r-header">
                        <span class="badge-new">NOVA CORRIDA</span>
                        <div class="r-fee">
                            <span>Você ganha:</span>
                            <strong>R$ ${(order.platformDriverFee || 5).toFixed(2)}</strong>
                        </div>
                    </div>
                    
                    <div class="route-info">
                        <div class="route-step">
                            <div class="step-dot dot-store"></div>
                            <small>Ponto de Coleta (Loja)</small>
                            <b>${order.storeName}</b>
                        </div>
                        <div class="route-step">
                            <div class="step-dot dot-house"></div>
                            <small>Ponto de Entrega (Cliente)</small>
                            <b>${order.customerName}</b>
                            <p>${order.customer.address}</p>
                        </div>
                    </div>
                    
                    <button class="btn-action btn-accept" onclick="window.acceptOrder('${order.id}', this)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        Aceitar Corrida
                    </button>
                </div>`).join('');
        }

        function renderMyOrders() {
            const container = document.getElementById('my-rides-list');
            document.getElementById('no-active-msg').style.display = myAcceptedOrders.length === 0 ? 'block' : 'none';
            
            container.innerHTML = myAcceptedOrders.map(order => {
                const store = storesCache[order.storeId] || {};
                const qCust = encodeURIComponent(order.customer.address + ', ' + loggedDriver.city);
                
                return `
                <div class="ride-card" style="border: 2px solid #00a14b;">
                    <div class="r-header" style="border-bottom: 1px dashed #eee;">
                        <span style="font-size: 0.8rem; font-weight: bold; color: #555;">PEDIDO #${order.id.substring(0,6).toUpperCase()}</span>
                        <div class="r-fee"><strong>R$ ${(order.platformDriverFee || 5).toFixed(2)}</strong></div>
                    </div>
                    
                    <div class="route-info">
                        <div class="route-step">
                            <div class="step-dot dot-store"></div>
                            <small>Retirar em:</small>
                            <b>${order.storeName}</b>
                        </div>
                        <div class="route-step">
                            <div class="step-dot dot-house"></div>
                            <small>Entregar em:</small>
                            <b>${order.customerName}</b>
                            <p>${order.customer.address}</p>
                        </div>
                    </div>
                    
                    <div style="display:flex; gap:10px; margin-top:20px;">
                        <button class="btn-waze" onclick="window.open('https://waze.com/ul?q=${qCust}&navigate=yes', '_blank')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                            Waze
                        </button>
                        <button class="btn-action btn-finish" onclick="window.finishDelivery('${order.id}')" style="margin: 0; flex: 2;">
                            Concluir
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        window.renderHistoryOrders = () => {
            const container = document.getElementById('history-rides-list');
            const selectedDate = document.getElementById('history-date-filter').value;
            const filterStart = new Date(selectedDate + 'T00:00:00').getTime();
            const filterEnd = filterStart + 86400000;
            
            const filtered = myHistoryOrders.filter(o => (o.deliveredAt || o.timestamp) >= filterStart && (o.deliveredAt || o.timestamp) < filterEnd);
            
            let total = 0;
            const list = filtered.map(o => {
                const fee = parseFloat(o.platformDriverFee || 5);
                total += fee;
                return `
                <div class="history-card">
                    <div class="h-store">${o.storeName}</div>
                    <div class="h-val">+ R$ ${fee.toFixed(2)}</div>
                </div>`;
            }).join('');
            
            container.innerHTML = `
                <div style="background:linear-gradient(135deg, #00a14b, #28d078); color:#fff; padding:20px; border-radius:16px; margin-bottom:20px; text-align:center; box-shadow: 0 4px 15px rgba(0, 161, 75, 0.25);">
                    <span style="font-size: 0.85rem; font-weight: bold; text-transform: uppercase;">Ganhos do dia (${filtered.length} corridas)</span>
                    <div style="font-size: 2.2rem; font-weight: 900; margin-top: 5px;">R$ ${total.toFixed(2)}</div>
                </div>
            ` + (list || '<div class="empty-msg"><p>Nenhuma entrega registrada neste dia.</p></div>');
        };

        window.acceptOrder = async (id, btn) => {
            btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> Aceitando...`;
            await updateDoc(doc(db, "orders", id), { status: 'Saiu para Entrega', driverId: loggedDriver.id, driverName: loggedDriver.name, driverPhone: loggedDriver.phone || "" });
            window.switchTab('minhas');
        };

        window.finishDelivery = async (id) => {
            if(confirm("Confirmar que a entrega foi concluída com sucesso?")) {
                await updateDoc(doc(db, "orders", id), { status: 'Concluído', deliveredAt: Date.now() });
                window.switchTab('historico');
            }
        };

        window.playAlertSound = () => {
            try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.5); } catch(e){}
        };
    </script>
</body>
</html>
