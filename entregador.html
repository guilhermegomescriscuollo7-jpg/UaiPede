<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Loja - UaiPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #f4f5f7; display: flex; height: 100vh; color: #333; overflow: hidden; }
        .sidebar { width: 260px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; }
        .store-header { padding: 25px 20px; border-bottom: 1px solid #f2f2f2; text-align: center; }
        .store-name { font-size: 1.2rem; font-weight: 900; color: #111; }
        .nav-menu { list-style: none; flex: 1; margin-top: 15px; overflow-y: auto; }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #555; font-weight: 600; display: flex; align-items: center; gap: 12px; }
        .nav-item.active { background: #fff5f5; color: #ea1d2c; border-left: 4px solid #ea1d2c; }
        .main-content { flex: 1; height: 100vh; overflow-y: auto; padding: 25px; background: #f4f5f7; }
        .section { display: none; height: 100%; flex-direction: column; }
        .section.active { display: flex !important; }
        .kanban-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; flex: 1; }
        .kanban-col { background: #fff; border-radius: 12px; padding: 15px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .order-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .btn-action { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #fff; margin-bottom: 5px; }
        .btn-call-driver { background: #ea1d2c; }
        .btn-call-driver:disabled { background: #ccc !important; cursor: not-allowed; }
        .driver-status-badge { background: #eef4ff; color: #0d6efd; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; margin-bottom: 15px; display: inline-block;}
        .driver-status-badge.offline { background: #fef0f0; color: #ea1d2c; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="store-header"><div class="store-name" id="ui-store-name">Loja</div></div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="window.switchTab('pedidos', this)">Pedidos</li>
        </ul>
    </aside>

    <main class="main-content">
        <section id="pedidos" class="section active">
            <div id="driver-status-indicator" class="driver-status-badge offline">Buscando entregadores...</div>
            <div class="kanban-board">
                <div class="kanban-col"><h3>Novos</h3><div id="list-pendente"></div></div>
                <div class="kanban-col"><h3>Preparando</h3><div id="list-preparo"></div></div>
                <div class="kanban-col"><h3>Em Rota</h3><div id="list-rota"></div></div>
                <div class="kanban-col"><h3>Finalizados</h3><div id="list-concluido"></div></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBinV28T4xWvYAnE0Yed1rbsp9dEF_n7Eg",
            authDomain: "dores-delivery.firebaseapp.com",
            projectId: "dores-delivery",
            storageBucket: "dores-delivery.firebasestorage.app",
            messagingSenderId: "1029498697239",
            appId: "1:1029498697239:web:3ebc070bbd65048bd9ce52"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loggedStore = JSON.parse(localStorage.getItem('loggedStore'));
        let onlineDriversCount = 0;
        let globalOrders = [];

        window.onload = () => {
            if(!loggedStore) return;
            document.getElementById('ui-store-name').innerText = loggedStore.name;

            // 🟢 ESCUTA TODOS OS ENTREGADORES E FILTRA LOCALMENTE (FIM DO ERRO DE ÍNDICE) 🟢
            onSnapshot(collection(db, "drivers"), (snapshot) => {
                onlineDriversCount = 0;
                let myCity = (loggedStore.city || "").toLowerCase().split('-')[0].trim();

                snapshot.forEach(docSnap => {
                    const drv = docSnap.data();
                    const drCity = (drv.city || "").toLowerCase().split('-')[0].trim();
                    if (drv.isOnline === true && (!myCity || drCity === myCity)) {
                        onlineDriversCount++;
                    }
                });

                const indicator = document.getElementById('driver-status-indicator');
                indicator.className = onlineDriversCount > 0 ? 'driver-status-badge' : 'driver-status-badge offline';
                indicator.innerText = onlineDriversCount > 0 ? `${onlineDriversCount} Entregador(es) Online` : "Nenhum entregador online";
                window.renderOrders();
            });

            onSnapshot(query(collection(db, "orders"), where("storeId", "==", loggedStore.id)), (snapshot) => {
                globalOrders = [];
                snapshot.forEach(docSnap => globalOrders.push({ id: docSnap.id, ...docSnap.data() }));
                window.renderOrders();
            });
        };

        window.renderOrders = () => {
            const cols = { Pendente: 'list-pendente', 'Aceito': 'list-preparo', 'Em Preparo': 'list-preparo', 'Aguardando Entregador': 'list-rota', 'Saiu para Entrega': 'list-rota', 'Concluído': 'list-concluido' };
            Object.values(cols).forEach(id => document.getElementById(id).innerHTML = '');

            globalOrders.forEach(order => {
                const colId = cols[order.status];
                if (!colId) return;

                let actionBtn = '';
                if (order.status === 'Pendente') actionBtn = `<button class="btn-action" style="background:#00a14b" onclick="window.upStatus('${order.id}','Aceito')">Aceitar</button>`;
                else if (order.status === 'Aceito') actionBtn = `<button class="btn-action" style="background:#f39c12" onclick="window.upStatus('${order.id}','Em Preparo')">Preparar</button>`;
                else if (order.status === 'Em Preparo') {
                    if (onlineDriversCount > 0) {
                        actionBtn = `<button class="btn-action btn-call-driver" onclick="window.upStatus('${order.id}','Aguardando Entregador')">Solicitar Entregador</button>`;
                    } else {
                        actionBtn = `<button class="btn-action btn-call-driver" disabled>Nenhum entregador disponível no momento.</button>`;
                    }
                }

                document.getElementById(colId).innerHTML += `
                    <div class="order-card">
                        <b>#${order.id.substring(0,5).toUpperCase()}</b><br>
                        ${order.customerName}<br>
                        ${actionBtn}
                    </div>`;
            });
        };

        window.upStatus = async (id, status) => { await updateDoc(doc(db, "orders", id), { status: status }); };
        window.switchTab = (id, el) => { };
    </script>
</body>
</html>
