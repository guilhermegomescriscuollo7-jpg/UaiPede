<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App do Entregador - UaiPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f4f5f7; color: #333; overflow-x: hidden; }
        
        /* TELA DE LOGIN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: #fff; width: 100%; max-width: 380px; padding: 40px 30px; border-radius: 24px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .login-box h2 { color: #ea1d2c; font-weight: 900; margin-bottom: 5px; font-size: 1.8rem; letter-spacing: -0.5px;}
        .login-box p { color: #777; font-size: 0.95rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.8rem; color: #555; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        .form-input { width: 100%; padding: 16px; border: 1px solid #e5e5e5; border-radius: 12px; font-size: 1rem; outline: none; background: #fdfdfd; transition: 0.3s; color: #333;}
        .form-input:focus { border-color: #ea1d2c; box-shadow: 0 0 0 4px rgba(234, 29, 44, 0.1); background: #fff;}
        .btn-login { width: 100%; background: linear-gradient(135deg, #ea1d2c, #ff4b58); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-size: 1.15rem; cursor: pointer; margin-top: 10px; box-shadow: 0 6px 15px rgba(234, 29, 44, 0.25); transition: 0.3s; }
        .btn-login:active { transform: translateY(2px); box-shadow: 0 2px 8px rgba(234, 29, 44, 0.2); }

        /* HEADER & NAVBAR */
        #app-screen { display: none; padding-bottom: 80px; }
        header { background: #111; color: #fff; padding: 30px 20px 40px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); position: sticky; top: 0; z-index: 100;}
        .app-logo { text-align: center; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .app-logo-text { font-size: 2.2rem; font-weight: 900; font-style: italic; letter-spacing: -1px; }
        .app-logo-text .uai { color: #ea1d2c; }
        .app-logo-text .pede { color: #fff; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .driver-info h1 { font-size: 1.4rem; font-weight: 900; color: #fff; margin: 0; letter-spacing: -0.5px;}
        
        /* STATUS TOGGLE (IOS STYLE) */
        .status-toggle { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); padding: 10px 16px; border-radius: 24px; }
        .status-toggle span { font-size: 0.85rem; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
        .toggle-switch { position: relative; width: 46px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}
        input:checked + .slider { background-color: #00a14b; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* TABS (FLUTUANTES) */
        .tabs { display: flex; gap: 8px; padding: 0 20px; margin-top: -25px; position: relative; z-index: 101; }
        .tab-btn { flex: 1; padding: 16px 5px; text-align: center; font-weight: 800; font-size: 0.85rem; border-radius: 14px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s;}
        .tab-btn.active { background: linear-gradient(135deg, #ea1d2c, #ff4b58); color: #fff; box-shadow: 0 6px 15px rgba(234, 29, 44, 0.25); }
        .tab-btn.inactive { background: #fff; color: #777; border: 1px solid #eee; }

        .content-area { padding: 25px 20px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS DE PEDIDO E HISTÓRICO */
        .ride-card { background: #fff; border-radius: 20px; padding: 22px; margin-bottom: 18px; box-shadow: 0 6px 20px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; transition: transform 0.2s;}
        .ride-card:active { transform: scale(0.98); }
        .ride-card.new { border: 2px solid #ea1d2c; animation: pulseBorder 2s infinite; }
        @keyframes pulseBorder { 0% { border-color: rgba(234,29,44,1); box-shadow: 0 0 0 0 rgba(234,29,44,0.4); } 70% { border-color: rgba(234,29,44,0.5); box-shadow: 0 0 0 10px rgba(234,29,44,0); } 100% { border-color: rgba(234,29,44,1); box-shadow: 0 0 0 0 rgba(234,29,44,0); } }
        
        .r-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .r-fee { font-size: 1.6rem; font-weight: 900; color: #00a14b; letter-spacing: -0.5px;}
        
        /* ESTILIZAÇÃO DO TEXTO INJETADO PELO JS (<p> e <b>) */
        .ride-card p { background: #f9f9f9; padding: 14px 16px; border-radius: 12px; margin-bottom: 12px; font-size: 0.95rem; color: #555; border-left: 4px solid #ddd; line-height: 1.5; }
        .ride-card.new p { border-left-color: #ea1d2c; }
        .ride-card b { color: #111; font-weight: 900; }

        /* BOTÕES DOS CARDS */
        .btn-waze { background: #eef4ff; color: #0d6efd; padding: 14px; border-radius: 12px; border: none; font-weight: 800; font-size: 1rem; width: 100%; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; box-shadow: 0 2px 8px rgba(13, 110, 253, 0.1); cursor: pointer;}
        .btn-waze:active { background: #dbe7ff; transform: scale(0.98);}
        
        .btn-action { width: 100%; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-size: 1.15rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s; margin-top: 5px;}
        .btn-action:active { transform: scale(0.98); }
        .btn-accept { background: linear-gradient(135deg, #ea1d2c, #ff4b58); color: #fff; box-shadow: 0 4px 15px rgba(234, 29, 44, 0.25); }
        .btn-finish { background: linear-gradient(135deg, #00a14b, #28d078); color: #fff; box-shadow: 0 4px 15px rgba(0, 161, 75, 0.25); }

        .empty-msg { text-align: center; padding: 50px 20px; }
        .empty-msg h3 { color: #111; font-weight: 900; font-size: 1.3rem; margin-bottom: 8px;}
        .empty-msg p { color: #777; font-size: 0.95rem; }

        /* NOTIFICAÇÃO TOAST */
        .toast-msg { position: fixed; top: -100px; left: 5%; right: 5%; background: #fff; border-left: 8px solid #ea1d2c; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); padding: 20px; display: flex; align-items: center; justify-content: center; gap: 15px; z-index: 100000; transition: top 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); border-right: 1px solid #f0f0f0; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0;}
        .toast-msg.show { top: 20px; }

        /* FILTRO DE HISTÓRICO */
        .filter-box { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #eee; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.02);}
        .filter-box label { font-weight: 800; color: #555; font-size: 0.95rem; text-transform: uppercase;}
        .filter-box input { padding: 12px 16px; border-radius: 10px; border: 1px solid #e5e5e5; outline: none; font-weight: bold; color: #111; font-family: 'Roboto', sans-serif; font-size: 1rem; background: #f9f9f9;}
        .filter-box input:focus { border-color: #ea1d2c; }

        /* REFINAMENTO DO CARD GERADO NO HISTÓRICO JS */
        #history-rides-list > div:first-child { box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; font-size: 1.1rem; }
        .ride-card[style*="border-left"] { border-radius: 16px !important; box-shadow: 0 4px 15px rgba(0,0,0,0.03) !important; border: 1px solid #f0f0f0; border-left: 6px solid #00a14b !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>UaiPede Entregas</h2>
            <div class="form-group"><label>E-mail</label><input type="email" id="login-email" class="form-input"></div>
            <div class="form-group"><label>Senha</label><input type="password" id="login-pass" class="form-input"></div>
            <button class="btn-login" onclick="window.loginDriver()">Entrar</button>
        </div>
    </div>

    <div id="app-screen">
        <header>
            <div class="app-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ea1d2c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 15 Q 50 55 95 15"></path></svg>
                <div class="app-logo-text"><span class="uai">Uai</span><span class="pede">Pede</span></div>
            </div>
            <div class="header-top">
                <div class="driver-info"><h1 id="driver-name-display">Olá</h1></div>
                <div class="status-toggle">
                    <span id="status-text">FORA DE SERVIÇO</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="driver-status-toggle" onchange="window.toggleOnlineStatus()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="tab-novas" onclick="window.switchTab('novas')">Novas <span id="badge-novas" style="background:#fff; color:#ea1d2c; padding:2px 6px; border-radius:10px; font-size:0.7rem; display:none;">0</span></button>
            <button class="tab-btn inactive" id="tab-minhas" onclick="window.switchTab('minhas')">Atuais</button>
            <button class="tab-btn inactive" id="tab-historico" onclick="window.switchTab('historico')">Realizadas</button>
        </div>

        <div class="content-area">
            <div id="sec-novas" class="section active">
                <div id="offline-msg" class="empty-msg"><h3>Você está Fora de Serviço</h3></div>
                <div id="no-rides-msg" class="empty-msg" style="display: none;"><h3>Buscando corridas...</h3></div>
                <div id="available-rides-list"></div>
            </div>
            <div id="sec-minhas" class="section"><div id="no-active-msg" class="empty-msg"><h3>Nenhuma entrega em andamento</h3></div><div id="my-rides-list"></div></div>
            <div id="sec-historico" class="section">
                <div class="filter-box"><label>Data:</label><input type="date" id="history-date-filter" onchange="window.renderHistoryOrders()"></div>
                <div id="history-rides-list"></div>
            </div>
        </div>
    </div>

    <div id="new-ride-toast" class="toast-msg">
        <h4 style="color:#ea1d2c; font-weight:900;">NOVA ENTREGA!</h4>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBinV28T4xWvYAnE0Yed1rbsp9dEF_n7Eg",
            authDomain: "dores-delivery.firebaseapp.com",
            projectId: "dores-delivery",
            storageBucket: "dores-delivery.firebasestorage.app",
            messagingSenderId: "1029498697239",
            appId: "1:1029498697239:web:3ebc070bbd65048bd9ce52"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let loggedDriver = JSON.parse(localStorage.getItem('loggedDriver'));
        let isOnline = false;
        let storesCache = {}; 
        let availableCount = 0;
        let allPendingOrders = [];
        let myAcceptedOrders = [];
        let myHistoryOrders = [];

        window.onload = async () => {
            if (loggedDriver && loggedDriver.id) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('driver-name-display').innerText = `Olá, ${loggedDriver.name.split(' ')[0]}`;
                if ("Notification" in window) Notification.requestPermission();
                document.getElementById('history-date-filter').value = new Date().toISOString().split('T')[0];
                await loadStoresCache();
                startListeners();
            }
        };

        window.loginDriver = async () => {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const btn = document.querySelector('.btn-login');
            try {
                const q = query(collection(db, "drivers"), where("email", "==", email), where("password", "==", pass));
                const snap = await getDocs(q);
                if (snap.empty) return alert("Erro");
                loggedDriver = { id: snap.docs[0].id, ...snap.docs[0].data() };
                localStorage.setItem('loggedDriver', JSON.stringify(loggedDriver));
                window.location.reload();
            } catch(e) {}
        };

        window.toggleOnlineStatus = async () => {
            isOnline = document.getElementById('driver-status-toggle').checked;
            document.getElementById('status-text').innerText = isOnline ? "EM SERVIÇO" : "FORA DE SERVIÇO";
            document.getElementById('status-text').style.color = isOnline ? "#00a14b" : "#fff";
            document.getElementById('offline-msg').style.display = isOnline ? 'none' : 'block';
            renderAvailableOrders(); 
            if(loggedDriver) await updateDoc(doc(db, "drivers", loggedDriver.id), { isOnline: isOnline });
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.classList.add('inactive'); });
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`sec-${tab}`).classList.add('active');
            if(tab === 'historico') window.renderHistoryOrders();
        };

        async function loadStoresCache() {
            const snap = await getDocs(collection(db, "stores"));
            snap.forEach(doc => { storesCache[doc.id] = doc.data(); });
        }

        function startListeners() {
            // 🟢 CONSULTA SIMPLIFICADA PARA EVITAR ERRO DE ÍNDICE 🟢
            onSnapshot(collection(db, "orders"), (snapshot) => {
                let tempPending = [];
                let drCity = (loggedDriver.city || "").toLowerCase().split('-')[0].trim();

                snapshot.forEach(docSnap => {
                    const order = { id: docSnap.id, ...docSnap.data() };
                    // Filtro manual em JS para garantir funcionamento
                    if (order.status === "Aguardando Entregador") {
                        const store = storesCache[order.storeId] || {};
                        const stCity = (store.city || "").toLowerCase().split('-')[0].trim();
                        if (!drCity || stCity === drCity) tempPending.push(order);
                    }
                });

                if(isOnline && tempPending.length > availableCount) {
                    window.playAlertSound();
                    window.showSystemNotification();
                }
                allPendingOrders = tempPending;
                availableCount = allPendingOrders.length;
                renderAvailableOrders();
            });

            onSnapshot(query(collection(db, "orders"), where("driverId", "==", loggedDriver.id)), (snapshot) => {
                myAcceptedOrders = []; myHistoryOrders = [];
                snapshot.forEach(docSnap => {
                    const order = { id: docSnap.id, ...docSnap.data() };
                    if (order.status === 'Saiu para Entrega') myAcceptedOrders.push(order);
                    if (['Concluído', 'Concluido', 'Entregue'].includes(order.status)) myHistoryOrders.push(order);
                });
                renderMyOrders();
            });
        }

        window.showSystemNotification = () => {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("UaiPede Entregas", { body: "🚀 Nova entrega disponível!" });
            }
        };

        function renderAvailableOrders() {
            const container = document.getElementById('available-rides-list');
            if (!isOnline) { container.innerHTML = ''; return; }
            document.getElementById('no-rides-msg').style.display = allPendingOrders.length === 0 ? 'block' : 'none';
            container.innerHTML = allPendingOrders.map(order => `
                <div class="ride-card new">
                    <div class="r-header"><div class="r-fee">R$ ${(order.platformDriverFee || 5).toFixed(2)}</div></div>
                    <p><b>${order.storeName}</b> ➔ ${order.customerName}</p>
                    <button class="btn-action btn-accept" onclick="window.acceptOrder('${order.id}', this)">Aceitar Corrida</button>
                </div>`).join('');
        }

        function renderMyOrders() {
            const container = document.getElementById('my-rides-list');
            document.getElementById('no-active-msg').style.display = myAcceptedOrders.length === 0 ? 'block' : 'none';
            container.innerHTML = myAcceptedOrders.map(order => {
                const store = storesCache[order.storeId] || {};
                const qCust = encodeURIComponent(order.customer.address + ', ' + loggedDriver.city);
                return `
                <div class="ride-card">
                    <p><b>Coleta:</b> ${order.storeName}</p>
                    <p><b>Entrega:</b> ${order.customer.address}</p>
                    <button class="btn-waze" onclick="window.open('https://waze.com/ul?q=${qCust}&navigate=yes', '_blank')">Abrir Waze</button>
                    <button class="btn-action btn-finish" onclick="window.finishDelivery('${order.id}')">Concluir</button>
                </div>`;
            }).join('');
        }

        window.renderHistoryOrders = () => {
            const container = document.getElementById('history-rides-list');
            const selectedDate = document.getElementById('history-date-filter').value;
            const filterStart = new Date(selectedDate + 'T00:00:00').getTime();
            const filterEnd = filterStart + 86400000;
            const filtered = myHistoryOrders.filter(o => (o.deliveredAt || o.timestamp) >= filterStart && (o.deliveredAt || o.timestamp) < filterEnd);
            let total = 0;
            const list = filtered.map(o => {
                const fee = parseFloat(o.platformDriverFee || 5);
                total += fee;
                return `<div class="ride-card" style="border-left:5px solid #00a14b; padding:15px; margin-bottom:15px;"><b>R$ ${fee.toFixed(2)}</b> - ${o.storeName}</div>`;
            }).join('');
            container.innerHTML = `<div style="background:#fff; padding:20px; border-radius:16px; margin-bottom:20px; text-align:center;"><b>Total do dia: R$ ${total.toFixed(2)}</b> <br> <span style="font-size:0.9rem; color:#777;">(${filtered.length} entregas)</span></div>` + list;
        };

        window.acceptOrder = async (id, btn) => {
            btn.innerText = "Aceitando...";
            await updateDoc(doc(db, "orders", id), { status: 'Saiu para Entrega', driverId: loggedDriver.id, driverName: loggedDriver.name, driverPhone: loggedDriver.phone || "" });
            window.switchTab('minhas');
        };

        window.finishDelivery = async (id) => {
            if(confirm("Concluir?")) await updateDoc(doc(db, "orders", id), { status: 'Concluído', deliveredAt: Date.now() });
        };

        window.playAlertSound = () => {
            try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.5); } catch(e){}
        };
    </script>
</body>
</html>
