<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App do Entregador - UaiPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f4f5f7; color: #333; overflow-x: hidden; }

        /* TELA DE LOGIN DO MOTOBOY */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: #fff; width: 100%; max-width: 400px; padding: 30px; border-radius: 16px; text-align: center; }
        .login-box h2 { color: #ea1d2c; font-weight: 900; margin-bottom: 5px; font-size: 1.8rem; }
        .login-box p { color: #777; font-size: 0.9rem; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.8rem; color: #555; font-weight: bold; margin-bottom: 5px; text-transform: uppercase;}
        .form-input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; background: #f9f9f9; }
        .form-input:focus { border-color: #ea1d2c; }
        .btn-login { width: 100%; background: #ea1d2c; color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }

        /* APP PRINCIPAL */
        #app-screen { display: none; padding-bottom: 80px; }
        
        header { background: #111; color: #fff; padding: 20px 20px 25px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100;}
        
        /* LOGO DO TOPO */
        .app-logo { text-align: center; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .app-logo-text { font-size: 2rem; font-weight: 900; font-style: italic; letter-spacing: -1px; }
        .app-logo-text .uai { color: #ea1d2c; }
        .app-logo-text .pede { color: #fff; }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .driver-info h1 { font-size: 1.3rem; font-weight: 900; color: #fff; margin: 0; }
        
        /* BOTÃO EM SERVIÇO / FORA DE SERVIÇO */
        .status-toggle { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 20px; }
        .status-toggle span { font-size: 0.85rem; font-weight: bold; color: #fff; }
        .toggle-switch { position: relative; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #00a14b; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* ABAS */
        .tabs { display: flex; gap: 5px; padding: 0 15px; margin-top: -20px; position: relative; z-index: 101; }
        .tab-btn { flex: 1; padding: 12px 2px; text-align: center; font-weight: bold; font-size: 0.8rem; border-radius: 10px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s;}
        .tab-btn.active { background: #ea1d2c; color: #fff; }
        .tab-btn.inactive { background: #fff; color: #555; border: 1px solid #eee; }

        .content-area { padding: 20px 15px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CARD DE CORRIDA */
        .ride-card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f2f2f2; position: relative; overflow: hidden;}
        .ride-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 5px; background: #0d6efd; }
        .ride-card.new { border: 2px solid #ea1d2c; animation: pulseBorder 1.5s infinite; }
        .ride-card.new::before { background: #ea1d2c; }
        
        @keyframes pulseBorder { 
            0% { border-color: #ea1d2c; } 
            50% { border-color: transparent; } 
            100% { border-color: #ea1d2c; } 
        }

        .r-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #eee; padding-bottom: 12px; margin-bottom: 15px; }
        .r-fee { font-size: 1.4rem; font-weight: 900; color: #00a14b; display: flex; align-items: center; gap: 6px;}
        .r-id { font-size: 0.8rem; color: #888; font-weight: bold;}

        .route-box { display: flex; flex-direction: column; margin-bottom: 20px; position: relative;}
        .route-box::after { content: ''; position: absolute; left: 11px; top: 20px; bottom: 80px; width: 2px; background: #ddd; z-index: 1;}
        
        .r-point { display: flex; gap: 15px; align-items: flex-start; position: relative; z-index: 2; margin-bottom: 10px;}
        .r-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.7rem; color: #fff; font-weight: bold;}
        .r-icon.store { background: #111; border: 2px solid #fff; box-shadow: 0 0 0 2px #111;}
        .r-icon.customer { background: #ea1d2c; border: 2px solid #fff; box-shadow: 0 0 0 2px #ea1d2c;}
        
        .r-details h4 { font-size: 0.9rem; color: #777; text-transform: uppercase; margin-bottom: 2px; }
        .r-details p { font-size: 1.05rem; color: #111; font-weight: bold; margin: 0;}
        .r-address { font-size: 0.85rem; color: #555; margin-top: 2px; line-height: 1.3;}

        /* BOTÃO DE NAVEGAÇÃO WAZE */
        .nav-buttons-row { display: flex; gap: 10px; margin-top: 10px; margin-bottom: 20px; padding-left: 39px; }
        .btn-waze { flex: 1; background: #f0f7ff; color: #0099ff; border: 1px solid #bce3ff; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }

        .pay-method-badge { display: inline-block; background: #fdf5e6; color: #997404; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; border: 1px solid #f9e1b5; margin-bottom: 15px;}

        .btn-action { width: 100%; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-size: 1.1rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s;}
        .btn-action:active { transform: scale(0.98); }
        .btn-accept { background: #ea1d2c; color: #fff; box-shadow: 0 4px 15px rgba(234, 29, 44, 0.3);}
        .btn-finish { background: #00a14b; color: #fff; box-shadow: 0 4px 15px rgba(0, 161, 75, 0.3);}

        .empty-msg { text-align: center; padding: 50px 20px; color: #999; }

        /* NOTIFICAÇÃO SONORA TOAST */
        .toast-msg { position: fixed; top: -100px; left: 5%; right: 5%; background: #fff; border-left: 8px solid #ea1d2c; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); padding: 18px; display: flex; align-items: center; gap: 15px; z-index: 100000; transition: top 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast-msg.show { top: 20px; }

        /* FILTRO DE HISTÓRICO */
        .filter-box { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;}
        .filter-box input { padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; font-weight: bold;}
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#ea1d2c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 15px;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 16 14"></polyline></svg>
            <h2>UaiPede Entregas</h2>
            <p>Faça login para receber corridas</p>
            <div class="form-group"><label>E-mail</label><input type="email" id="login-email" class="form-input"></div>
            <div class="form-group"><label>Senha</label><input type="password" id="login-pass" class="form-input"></div>
            <button class="btn-login" onclick="window.loginDriver()">Entrar</button>
        </div>
    </div>

    <div id="app-screen">
        <header>
            <div class="app-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ea1d2c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 15 Q 50 55 95 15"></path></svg>
                <div class="app-logo-text"><span class="uai">Uai</span><span class="pede">Pede</span></div>
            </div>
            <div class="header-top">
                <div class="driver-info"><h1 id="driver-name-display">Olá</h1></div>
                <div class="status-toggle">
                    <span id="status-text">FORA DE SERVIÇO</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="driver-status-toggle" onchange="window.toggleOnlineStatus()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="tab-novas" onclick="window.switchTab('novas')">Novas <span id="badge-novas" style="background:#fff; color:#ea1d2c; padding:2px 6px; border-radius:10px; font-size:0.7rem; display:none;">0</span></button>
            <button class="tab-btn inactive" id="tab-minhas" onclick="window.switchTab('minhas')">Atuais</button>
            <button class="tab-btn inactive" id="tab-historico" onclick="window.switchTab('historico')">Realizadas</button>
        </div>

        <div class="content-area">
            <div id="sec-novas" class="section active">
                <div id="offline-msg" class="empty-msg"><h3>Você está Fora de Serviço</h3><p>Ligue a chave acima para receber pedidos.</p></div>
                <div id="no-rides-msg" class="empty-msg" style="display: none;"><h3>Buscando corridas...</h3></div>
                <div id="available-rides-list"></div>
            </div>
            <div id="sec-minhas" class="section"><div id="no-active-msg" class="empty-msg"><h3>Nenhuma entrega em andamento</h3></div><div id="my-rides-list"></div></div>
            <div id="sec-historico" class="section">
                <div class="filter-box"><label>Data:</label><input type="date" id="history-date-filter" onchange="window.renderHistoryOrders()"></div>
                <div id="history-rides-list"></div>
            </div>
        </div>
    </div>

    <div id="new-ride-toast" class="toast-msg">
        <div style="background: #ea1d2c; color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </div>
        <div>
            <h4 style="margin:0; color:#ea1d2c; font-size:1.1rem; font-weight:900;">NOVA ENTREGA!</h4>
            <p style="margin:0; font-size:0.9rem; color:#333;">Toque para ver os detalhes da corrida.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBinV28T4xWvYAnE0Yed1rbsp9dEF_n7Eg",
            authDomain: "dores-delivery.firebaseapp.com",
            projectId: "dores-delivery",
            storageBucket: "dores-delivery.firebasestorage.app",
            messagingSenderId: "1029498697239",
            appId: "1:1029498697239:web:3ebc070bbd65048bd9ce52"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let loggedDriver = JSON.parse(localStorage.getItem('loggedDriver'));
        let isOnline = false;
        let storesCache = {}; 
        let availableCount = 0;
        let myHistoryOrders = [];

        window.onload = async () => {
            if (loggedDriver && loggedDriver.id) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('driver-name-display').innerText = `Olá, ${loggedDriver.name.split(' ')[0]}`;
                
                // Pedir permissão para notificação na barra de status
                if ("Notification" in window) {
                    Notification.requestPermission();
                }

                const todayIso = new Date().toISOString().split('T')[0];
                document.getElementById('history-date-filter').value = todayIso;
                await loadStoresCache();
                startListeners();
            }
        };

        window.loginDriver = async () => {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const btn = document.querySelector('.btn-login');
            if (!email || !pass) return alert("Preencha e-mail e senha.");
            btn.innerText = "Verificando..."; btn.disabled = true;
            try {
                const q = query(collection(db, "drivers"), where("email", "==", email), where("password", "==", pass));
                const snap = await getDocs(q);
                if (snap.empty) { alert("Acesso negado."); btn.innerText = "Entrar"; btn.disabled = false; return; }
                const docData = snap.docs[0];
                loggedDriver = { id: docData.id, ...docData.data() };
                localStorage.setItem('loggedDriver', JSON.stringify(loggedDriver));
                window.location.reload();
            } catch(e) { btn.innerText = "Entrar"; btn.disabled = false; }
        };

        window.toggleOnlineStatus = async () => {
            isOnline = document.getElementById('driver-status-toggle').checked;
            document.getElementById('status-text').innerText = isOnline ? "EM SERVIÇO" : "FORA DE SERVIÇO";
            document.getElementById('status-text').style.color = isOnline ? "#00a14b" : "#fff";
            document.getElementById('offline-msg').style.display = isOnline ? 'none' : 'block';
            if(isOnline && availableCount === 0) document.getElementById('no-rides-msg').style.display = 'block';
            else document.getElementById('no-rides-msg').style.display = 'none';
            
            renderAvailableOrders(); 
            try { if(loggedDriver) await updateDoc(doc(db, "drivers", loggedDriver.id), { isOnline: isOnline }); } catch(e) {}
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.classList.add('inactive'); });
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.remove('inactive');
            document.getElementById(`sec-${tab}`).classList.add('active');
            if(tab === 'historico') window.renderHistoryOrders();
        };

        async function loadStoresCache() {
            const snap = await getDocs(collection(db, "stores"));
            snap.forEach(doc => { storesCache[doc.id] = doc.data(); });
        }

        function startListeners() {
            const qPending = query(collection(db, "orders"), where("status", "==", "Aguardando Entregador"));
            onSnapshot(qPending, (snapshot) => {
                let safeDriverCity = loggedDriver.city || '';
                let newRides = [];
                snapshot.forEach(doc => {
                    const order = { id: doc.id, ...doc.data() };
                    const storeCity = storesCache[order.storeId] ? storesCache[order.storeId].city : null;
                    if (!safeDriverCity || storeCity === safeDriverCity || storeCity === safeDriverCity.split(' - ')[0]) {
                        newRides.push(order);
                    }
                });

                // 🔔 NOTIFICAR NA BARRA DE STATUS E SOM 🔔
                if(isOnline && newRides.length > availableCount) {
                    window.playAlertSound();
                    window.showToast(); // Toast no App
                    window.showSystemNotification(); // Barra de Notificação
                }
                
                allPendingOrders = newRides;
                availableCount = allPendingOrders.length;
                renderAvailableOrders();
            });

            const qMyRides = query(collection(db, "orders"), where("driverId", "==", loggedDriver.id));
            onSnapshot(qMyRides, (snapshot) => {
                myAcceptedOrders = []; myHistoryOrders = [];
                snapshot.forEach(doc => {
                    const order = { id: doc.id, ...doc.data() };
                    if (order.status === 'Saiu para Entrega') myAcceptedOrders.push(order);
                    if (['Concluído', 'Concluido', 'Entregue'].includes(order.status)) myHistoryOrders.push(order);
                });
                renderMyOrders();
                if (document.getElementById('sec-historico').classList.contains('active')) window.renderHistoryOrders();
            });
        }

        // 🟢 MOSTRAR NA BARRA DE NOTIFICAÇÃO DO CELULAR 🟢
        window.showSystemNotification = () => {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("UaiPede Entregas", {
                    body: "🚀 Tem uma nova entrega disponível na sua cidade!",
                    icon: "https://cdn-icons-png.flaticon.com/512/709/709790.png", // Ícone de motinha
                    vibrate: [200, 100, 200]
                });
            }
        };

        function renderAvailableOrders() {
            const container = document.getElementById('available-rides-list');
            const badge = document.getElementById('badge-novas');
            if (!isOnline) { container.innerHTML = ''; badge.style.display = 'none'; return; }
            document.getElementById('no-rides-msg').style.display = allPendingOrders.length === 0 ? 'block' : 'none';
            badge.style.display = allPendingOrders.length > 0 ? 'inline-block' : 'none';
            badge.innerText = allPendingOrders.length;
            container.innerHTML = allPendingOrders.map(order => {
                const fee = order.platformDriverFee || order.deliveryFee || 5.00;
                return `
                <div class="ride-card new">
                    <div class="r-header"><div class="r-fee">R$ ${parseFloat(fee).toFixed(2)}</div><div class="r-id">#${order.id.substring(0,5).toUpperCase()}</div></div>
                    <div class="route-box">
                        <div class="r-point"><div class="r-icon store">L</div><div class="r-details"><h4>Retirar em</h4><p>${order.storeName}</p></div></div>
                        <div class="r-point"><div class="r-icon customer">C</div><div class="r-details"><h4>Entregar para</h4><p>${order.customerName}</p></div></div>
                    </div>
                    <button class="btn-action btn-accept" onclick="window.acceptOrder('${order.id}', this)">Aceitar Corrida</button>
                </div>`;
            }).join('');
        }

        function renderMyOrders() {
            const container = document.getElementById('my-rides-list');
            document.getElementById('no-active-msg').style.display = myAcceptedOrders.length === 0 ? 'block' : 'none';
            container.innerHTML = myAcceptedOrders.map(order => {
                const qStore = encodeURIComponent((storesCache[order.storeId]?.street || '') + ', ' + (loggedDriver.city || ''));
                const qCust = encodeURIComponent((order.customer.address || '') + ', ' + (loggedDriver.city || ''));
                return `
                <div class="ride-card">
                    <div class="r-header"><div class="r-fee">R$ ${parseFloat(order.platformDriverFee || 5).toFixed(2)}</div></div>
                    <div class="route-box">
                        <div class="r-point"><div class="r-icon store">L</div><div class="r-details"><h4>Coleta: ${order.storeName}</h4></div></div>
                        <button class="btn-waze" onclick="window.open('https://waze.com/ul?q=${qStore}&navigate=yes', '_blank')">Waze até a Loja</button>
                        <div class="r-point" style="margin-top:10px;"><div class="r-icon customer">C</div><div class="r-details"><h4>Cliente: ${order.customerName}</h4></div></div>
                        <button class="btn-waze" onclick="window.open('https://waze.com/ul?q=${qCust}&navigate=yes', '_blank')">Waze até o Cliente</button>
                    </div>
                    <div class="pay-method-badge">Cobrar: ${order.paymentMethod}</div>
                    <button class="btn-action btn-finish" onclick="window.finishDelivery('${order.id}')">Concluir Entrega</button>
                </div>`;
            }).join('');
        }

        window.renderHistoryOrders = () => {
            const container = document.getElementById('history-rides-list');
            const selectedDate = document.getElementById('history-date-filter').value;
            const filterStart = new Date(selectedDate + 'T00:00:00').getTime();
            const filterEnd = filterStart + 86400000;
            const filtered = myHistoryOrders.filter(o => (o.deliveredAt || o.timestamp) >= filterStart && (o.deliveredAt || o.timestamp) < filterEnd);
            let total = 0;
            const list = filtered.map(o => {
                const fee = parseFloat(o.platformDriverFee || o.deliveryFee || 5);
                total += fee;
                return `<div class="ride-card" style="border-left:5px solid #00a14b; padding:15px; margin-bottom:10px;">
                    <div style="display:flex; justify-content:space-between;"><b>R$ ${fee.toFixed(2)}</b> <small>#${o.id.substring(0,5).toUpperCase()}</small></div>
                    <small>${o.storeName} ➔ ${o.customerName}</small>
                </div>`;
            }).join('');
            container.innerHTML = `<div style="background:#fff; padding:15px; border-radius:12px; margin-bottom:15px; text-align:center; border:1px solid #eee;">
                <small>Total do dia:</small><br><b style="font-size:1.5rem; color:#00a14b;">R$ ${total.toFixed(2)}</b><br><small>${filtered.length} entregas</small>
            </div>` + list;
        };

        window.acceptOrder = async (orderId, btn) => {
            if(!confirm("Aceitar entrega?")) return;
            btn.innerText = "Aceitando..."; btn.disabled = true;
            try { await updateDoc(doc(db, "orders", orderId), { status: 'Saiu para Entrega', driverId: loggedDriver.id, driverName: loggedDriver.name, driverPhone: loggedDriver.phone }); window.switchTab('minhas'); } 
            catch(e) { alert("Erro ao aceitar."); btn.disabled = false; }
        };

        window.finishDelivery = async (id) => {
            if(!confirm("Concluir?")) return;
            try { await updateDoc(doc(db, "orders", id), { status: 'Concluído', deliveredAt: Date.now() }); } catch(e) {}
        };

        window.playAlertSound = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;
                [880, 1100, 880, 1100].forEach((f, i) => {
                    const o = ctx.createOscillator(); const g = ctx.createGain();
                    o.type = 'sine'; o.connect(g); g.connect(ctx.destination);
                    o.frequency.setValueAtTime(f, now + (i * 0.3)); g.gain.setValueAtTime(0.5, now + (i * 0.3));
                    g.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.3) + 0.2);
                    o.start(now + (i * 0.3)); o.stop(now + (i * 0.3) + 0.3);
                });
            } catch (e) {}
        };

        window.showToast = () => {
            const t = document.getElementById('new-ride-toast');
            t.classList.add('show');
            t.onclick = () => { t.classList.remove('show'); window.switchTab('novas'); };
            setTimeout(() => t.classList.remove('show'), 10000);
        };
    </script>
</body>
</html>
